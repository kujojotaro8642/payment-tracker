<!DOCTYPE html>
<html>
<head>
  <title>Payment Tracker</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2, h3 {
      text-align: center;
    }

    input {
      width: 30%;
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .overdue {
      color: red;
      font-weight: bold;
    }
  </style>

</head>

<body>

<div class="container">

<h2>💰 Payment Tracker</h2>

<input id="name" placeholder="Client Name">
<input id="amount" placeholder="Amount">
<input id="date" type="date">
<button onclick="addPayment()">Add</button>

<h3>Payments</h3>
<ul id="list"></ul>

</div>

<script>
let payments = JSON.parse(localStorage.getItem("payments")) || [];

function save() {
  localStorage.setItem("payments", JSON.stringify(payments));
}

function addPayment() {
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;
  let date = document.getElementById("date").value;

  if (!name || !amount || !date) {
    alert("Please fill all fields");
    return;
  }

  payments.push({ name, amount, date, paid: false });
  save();
  render();
}

function markPaid(index) {
  payments[index].paid = true;
  save();
  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let today = new Date();

  payments.forEach((p, i) => {
    let li = document.createElement("li");

    let due = new Date(p.date);
    let status = p.paid ? "✅ Paid" : (due < today ? "❌ Overdue" : "⏳ Pending");

    let className = (!p.paid && due < today) ? "overdue" : "";

    li.innerHTML = `
      <span class="${className}">
        ${p.name} - ₹${p.amount} - ${status}
      </span>
      <br>
      <button onclick="markPaid(${i})">Mark Paid</button>
      <button onclick="copyMsg('${p.name}', '${p.amount}')">Reminder</button>
      <hr>
    `;

    list.appendChild(li);
  });
}

function copyMsg(name, amount) {
  let msg = `Hi ${name}, just a reminder that ₹${amount} is pending. Please clear it. Thank you.`;
  navigator.clipboard.writeText(msg);
  alert("Message copied!");
}

render();
</script>

</body>
</html>
</body>
</html>
