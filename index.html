<!DOCTYPE html>
<html>
<head>
  <title>Payment Tracker</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px; padding: 8px; }
    .overdue { color: red; }
  </style>
</head>

<body>

<h2>Payment Tracker</h2>

<input id="name" placeholder="Client Name">
<input id="amount" placeholder="Amount">
<input id="date" type="date">
<button onclick="addPayment()">Add</button>

<h3>Payments</h3>
<ul id="list"></ul>

<script>
let payments = JSON.parse(localStorage.getItem("payments")) || [];

function save() {
  localStorage.setItem("payments", JSON.stringify(payments));
}

function addPayment() {
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;
  let date = document.getElementById("date").value;

  payments.push({ name, amount, date, paid: false });
  save();
  render();
}

function markPaid(index) {
  payments[index].paid = true;
  save();
  render();
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let today = new Date();

  payments.forEach((p, i) => {
    let li = document.createElement("li");

    let due = new Date(p.date);
    let status = p.paid ? "✅ Paid" : (due < today ? "❌ Overdue" : "⏳ Pending");

    let className = (!p.paid && due < today) ? "overdue" : "";

    li.innerHTML = `
      <span class="${className}">
        ${p.name} - ₹${p.amount} - ${status}
      </span>
      <button onclick="markPaid(${i})">Mark Paid</button>
      <button onclick="copyMsg('${p.name}', '${p.amount}')">Reminder</button>
    `;

    list.appendChild(li);
  });
}

function copyMsg(name, amount) {
  let msg = `Hi ${name}, just a reminder that ₹${amount} is pending. Please clear it. Thank you.`;
  navigator.clipboard.writeText(msg);
  alert("Message copied!");
}

render();
</script>

</body>
</html>
